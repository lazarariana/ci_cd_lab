apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: go-simple-webserver
  labels:
    app: go-simple-webserver
spec:
  replicas: 10
  strategy:
    canary:
      steps:
        - setWeight: 50
        - pause: { duration: 60s }
        - setWeight: 100
  selector:
    matchLabels:
      app: go-simple-webserver
  template:
    metadata:
      labels:
        app: go-simple-webserver
    spec:
      containers:
        - name: webserver
          image: ghcr.io/lazarariana/go-simple-webserver@sha256:83a80b2451498f6a6721b9fce74a03eb4a2273b42a7e2dfd28ed42b2f7ff31bc
          ports:
            - containerPort: 8080
          imagePullPolicy: Always
